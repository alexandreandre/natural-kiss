name: CI

on:
  push:
    branches: [main]
  pull_request:

# Clés de démo LOCALES Supabase (identiques sur toute machine, non secrètes).
env:
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
  SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

jobs:
  quality:
    name: Lint · Typecheck · Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check

  test:
    name: Tests (unit · intégration · E2E) sur Supabase local
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: npm ci

      # Supabase local : `start` applique migrations + seed automatiquement.
      - name: Start Supabase
        run: supabase start

      # Garde-fou : les types générés sont bien à jour vis-à-vis du schéma.
      - name: Verify generated types are up to date
        run: |
          npm run types
          git diff --exit-code -- src/lib/supabase/types.ts \
            || (echo "::error::src/lib/supabase/types.ts obsolète — lancez 'npm run types'." && exit 1)

      - name: Seed Storage (fichiers de démo)
        run: npm run seed
        continue-on-error: true # les PDF de démo peuvent être absents du dépôt

      - name: Unit & integration tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Stop Supabase
        if: always()
        run: supabase stop
